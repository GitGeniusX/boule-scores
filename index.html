<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ecd9b0" />
    <title>Boule — Score Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%23b38a4a'/%3E%3Ccircle cx='12' cy='12' r='2' fill='%23f7eac8'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <svg class="logo" width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="11" cy="16" r="9" fill="currentColor" opacity="0.85" />
          <circle cx="22" cy="19" r="6" fill="currentColor" opacity="0.55" />
          <circle cx="26" cy="11" r="3" fill="#d94a1f" />
        </svg>
        <span class="brand-name">Boule</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" data-action="reset" aria-label="Reset match" title="Reset match">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
        </button>
        <button class="icon-btn" data-theme-toggle aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="board" id="board">
      <!-- Team cards injected by JS -->
    </main>

    <section class="meta" aria-label="Match info">
      <div class="meta-item">
        <span class="meta-label">Round</span>
        <span class="meta-value" id="roundNum">1</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Target</span>
        <span class="meta-value">
          <button class="target-btn" id="targetBtn" aria-label="Change winning score">13</button>
        </span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Leader</span>
        <span class="meta-value" id="leaderLabel">—</span>
      </div>
    </section>

    <section class="history" aria-label="Round history">
      <div class="history-head">
        <h2>Rounds</h2>
        <button class="ghost-btn" id="undoBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg>
          Undo last round
        </button>
      </div>
      <ol class="history-list" id="historyList" role="list">
        <li class="history-empty">No rounds played yet — add points to a team to start.</li>
      </ol>
    </section>

    <!-- Winner overlay -->
    <div class="winner" id="winner" hidden>
      <div class="winner-card">
        <div class="winner-eyebrow">Match over</div>
        <div class="winner-name" id="winnerName">—</div>
        <div class="winner-score" id="winnerScore">— – —</div>
        <div class="winner-actions">
          <button class="primary-btn" data-action="rematch">Rematch</button>
          <button class="ghost-btn" data-action="dismiss">Keep viewing</button>
        </div>
      </div>
    </div>

    <!-- Target picker dialog -->
    <dialog id="targetDialog" class="dialog">
      <form method="dialog">
        <h3>Winning score</h3>
        <p class="dialog-hint">First team to reach this total wins the match.</p>
        <div class="target-options" role="radiogroup">
          <label><input type="radio" name="target" value="11" /><span>11</span></label>
          <label><input type="radio" name="target" value="13" /><span>13</span></label>
          <label><input type="radio" name="target" value="15" /><span>15</span></label>
          <label><input type="radio" name="target" value="21" /><span>21</span></label>
        </div>
        <div class="dialog-actions">
          <button value="cancel" class="ghost-btn">Cancel</button>
          <button value="ok" class="primary-btn" id="targetOk">Save</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
